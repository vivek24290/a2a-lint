name: a2a-lint
description: >-
  Lint your A2A agent in CI: validate its agent card against the spec and
  run a live message/send conformance probe.
branding:
  icon: check-circle
  color: purple

inputs:
  url:
    description: Base URL of the agent to lint (must be reachable from the runner)
    required: true
  live:
    description: Also perform a live message/send round trip
    default: "true"
  strict:
    description: Treat warnings as failures
    default: "false"

runs:
  using: composite
  steps:
    - name: Install a2a-lint
      shell: bash
      run: pip install --quiet "${{ github.action_path }}"
    - name: Run a2a-lint
      shell: bash
      run: |
        FLAGS=""
        [ "${{ inputs.live }}" = "true" ] && FLAGS="$FLAGS --live"
        [ "${{ inputs.strict }}" = "true" ] && FLAGS="$FLAGS --strict"
        a2a-lint "${{ inputs.url }}" $FLAGS
