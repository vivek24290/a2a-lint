services:
  playground:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "8090:8090"
    environment:
      - DATA_DIR=/app/data
    volumes:
      # Session permalinks live in a SQLite file that survives rebuilds.
      - ./data:/app/data
    extra_hosts:
      # Lets the container probe agents running on the WSL host
      # (e.g. the a2a-demo containers published on localhost:8001/8002):
      # use http://host.docker.internal:8001 as the agent URL.
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
